name: AgentGuard Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  scan:
    runs-on: ubuntu-latest
    continue-on-error: true  # findings are informational, not CI blockers
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install AgentGuard
        run: pip install agentguardp
      - name: Run AgentGuard Scan
        run: agentguard scan . --format sarif -o agentguard-report.sarif || true
      - name: Upload SARIF
        if: hashFiles('agentguard-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: agentguard-report.sarif

name: AgentGuard Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  statuses: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install rich typer
      - name: Run AgentGuard Scan
        run: |
          cd $GITHUB_WORKSPACE
          PYTHONPATH=$PYTHONPATH:$(pwd) python -m agentguard.cli scan . --format terminal; exit 0

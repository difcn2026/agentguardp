name: AgentGuard Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: AgentGuard Scan
        uses: difcn2026/agentguardp@main
        with:
          path: .
          format: sarif
          mode: scan
          tier: free
